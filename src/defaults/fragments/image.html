<div class="image">{%- if has_services -%}<picture><source media="(display-mode: fullscreen) and (min-resolution: 2x)" srcset="{{ get_image_url(src=src, width=3840) | safe }}"><source media="(display-mode: fullscreen)" srcset="{{ get_image_url(src=src, width=2016) | safe }}"><source media="(min-width: 1008px) and (min-resolution: 2x)" srcset="{{ get_image_url(src=src, width=2016) | safe }}"><source media="(min-width: 1008px)" srcset="{{ get_image_url(src=src, width=1008) | safe }}"><source media="(min-width: 784px) and (min-resolution: 2x)" srcset="{{ get_image_url(src=src, width=1568) | safe }}"><source media="(min-width: 784px)" srcset="{{ get_image_url(src=src, width=784) | safe }}"><source media="(min-width: 352px) and (min-resolution: 2x)" srcset="{{ get_image_url(src=src, width=704) | safe }}"><source media="(min-width: 352px)" srcset="{{ get_image_url(src=src, width=352) | safe }}"><img src="{{ get_image_url(src=src, width=1008) | safe }}" alt="{{ alt }}"{% if lazy_images %} loading="lazy"{% endif %}></picture><a class="fullscreen" onclick="fullscreen(arguments[0])">&#x26F6;</a>{%- else -%}<img src="{{ src }}" alt="{{ alt }}"{% if lazy_images %} loading="lazy"{% endif %}/>{%- endif -%}</div>
