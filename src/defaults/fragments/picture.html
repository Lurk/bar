<div class="image">{%- if has_services -%}{%- set fallback_src = srcset | split(pat=",") | first | trim | split(pat=" ") | first -%}<img src="{{ fallback_src }}" srcset="{{ srcset | safe }}" sizes="{{ image_sizes }}" alt="{{ alt }}"{% if lazy_images %} loading="lazy"{% endif %}>{%- if fullscreen | default(value=true) -%}<a class="fullscreen" onclick="document.fullscreenElement?document.exitFullscreen():this.previousElementSibling.requestFullscreen()">&#x26F6;</a>{%- endif -%}{%- else -%}<img src="{{ src }}" alt="{{ alt }}"{% if lazy_images %} loading="lazy"{% endif %}/>{%- endif -%}</div>
